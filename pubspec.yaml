name: salon_presensi
description: Aplikasi Presensi Pegawai Salon Berbasis GPS

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Navigasi & state
  get: ^4.6.6
  # Lokasi GPS
  geolocator: ^11.0.0
  # Penyimpanan lokal
  shared_preferences: ^2.2.3
  # Database lokal
  sqflite: ^2.3.3+1
  sqflite_common_ffi_web: ^0.4.5+2
  path: ^1.9.0
  # Peta
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # Tampilan
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  # Gambar profil
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  camera: ^0.11.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
